services:
  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    env_file: .env
    volumes:
      - ${DATA_ROOT}/configs:/configs
      - ${DATA_ROOT}/logs:/logs
      - ${DATA_ROOT}/customFiles:/customFiles
      - ${DATA_ROOT}/pipeline:/pipeline
      - ${DATA_ROOT}/tessdata:/usr/share/tessdata
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/login || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - homeserver

networks:
  homeserver:
    external: true
