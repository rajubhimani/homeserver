services:
  stirling-pdf-lite:
    image: stirlingtools/stirling-pdf:latest-ultra-lite
    container_name: stirling-pdf-lite
    restart: unless-stopped
    env_file: .env
    environment:
      DISABLE_ADDITIONAL_FEATURES: "false"
      SECURITY_ENABLELOGIN: "true"
      SECURITY_INITIALLOGIN_USERNAME: ${STIRLING_ADMIN_USER}
      SECURITY_INITIALLOGIN_PASSWORD: ${STIRLING_ADMIN_PASSWORD}
    volumes:
      - ${DATA_ROOT}/configs:/configs
      - ${DATA_ROOT}/logs:/logs
      - ${DATA_ROOT}/customFiles:/customFiles
      - ${DATA_ROOT}/pipeline:/pipeline
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - homeserver

networks:
  homeserver:
    external: true
