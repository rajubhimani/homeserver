services:
  nextcloud-db:
    image: postgres:18
    container_name: nextcloud-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${DATA_ROOT}/postgres:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homeserver

  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homeserver

  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}
      NEXTCLOUD_TRUSTED_PROXIES: nginx-proxy-manager
      REDIS_HOST: nextcloud-redis
      REDIS_HOST_PORT: 6379
    volumes:
      - nextcloud_html:/var/www/html
      - ${DATA_ROOT}/config:/var/www/html/config
      - ${DATA_ROOT}/data:/var/www/html/data
      - ${DATA_ROOT}/custom_apps:/var/www/html/custom_apps
      - ./hooks/before-starting:/docker-entrypoint-hooks.d/before-starting
      - ${USER_DATA_ROOT}:/mnt/seagate
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_healthy
    networks:
      - homeserver

  nextcloud-cron:
    image: nextcloud:latest
    container_name: nextcloud-cron
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: /bin/sh -c "until [ -f /var/www/html/lib/versioncheck.php ]; do sleep 5; done; while true; do runuser -u www-data -- php /var/www/html/cron.php; sleep 300; done"
    volumes:
      - nextcloud_html:/var/www/html
      - ${DATA_ROOT}/config:/var/www/html/config
      - ${DATA_ROOT}/data:/var/www/html/data
      - ${DATA_ROOT}/custom_apps:/var/www/html/custom_apps
      - ${USER_DATA_ROOT}:/mnt/seagate
    depends_on:
      - nextcloud
    networks:
      - homeserver

volumes:
  nextcloud_html:

networks:
  homeserver:
    external: true
