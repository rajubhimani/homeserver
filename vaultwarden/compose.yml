services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    env_file: .env
    environment:
      DOMAIN: ${VAULTWARDEN_DOMAIN}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      SIGNUPS_ALLOWED: "false"
    volumes:
      - ${DATA_ROOT}/vaultwarden:/data
    networks:
      - homeserver

networks:
  homeserver:
    external: true
