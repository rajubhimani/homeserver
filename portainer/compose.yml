services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - ${DATA_ROOT}/data:/data
    networks:
      - homeserver

networks:
  homeserver:
    external: true
