server {
    listen 80;

    # Use Docker's internal DNS, resolve at request time not startup
    resolver 10.89.0.1 valid=10s;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location /health/immich {
        set $upstream http://immich-server:2283;
        proxy_pass $upstream/;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        proxy_hide_header Content-Type;
        add_header Content-Type "text/plain";
    }

    location /health/nextcloud {
        set $upstream http://nextcloud:80;
