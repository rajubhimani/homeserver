services:
  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: roundcube
    restart: unless-stopped
    env_file: .env
    environment:
      ROUNDCUBEMAIL_DEFAULT_HOST: ${IMAP_HOST:-stalwart}
      ROUNDCUBEMAIL_DEFAULT_PORT: ${IMAP_PORT:-143}
      ROUNDCUBEMAIL_SMTP_SERVER: ${SMTP_HOST:-stalwart}
      ROUNDCUBEMAIL_SMTP_PORT: ${SMTP_PORT:-587}
      ROUNDCUBEMAIL_DB_TYPE: sqlite
    volumes:
      - ${DATA_ROOT}/data:/var/roundcube/data
      - ${DATA_ROOT}/logs:/var/log/roundcube
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - homeserver

networks:
  homeserver:
    external: true
