services:
  authentik-db:
    security_opt:
      - label=disable
  authentik-redis:
    security_opt:
      - label=disable
  authentik-server:
    security_opt:
      - label=disable
    depends_on:
      - authentik-db
      - authentik-redis
  authentik-worker:
    security_opt:
      - label=disable
    depends_on:
      - authentik-db
      - authentik-redis
