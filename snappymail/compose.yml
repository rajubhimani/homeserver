services:
  snappymail:
    image: djmaze/snappymail:latest
    container_name: snappymail
    restart: unless-stopped
    env_file: .env
    volumes:
      - ${DATA_ROOT}/data:/snappymail/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - homeserver

networks:
  homeserver:
    external: true
